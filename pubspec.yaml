name: digital_notice_board
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  provider: ^6.1.5+1
  intl: ^0.20.2
  uuid: ^4.5.3
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  shared_preferences: ^2.2.3
  qr_flutter: ^4.1.0
  google_generative_ai: ^0.4.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1   # 👈 ADD THIS

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"   # 👈 YOUR ICON PATH

flutter:
  uses-material-design: true

  assets:
    - assets/images/categories/
    - assets/icon.png   # 👈 ADD THIS